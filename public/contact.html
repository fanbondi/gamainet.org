<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — AI-GAMNET</title>
  <meta name="description" content="Get in touch with AI-GAMNET." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="editor-toolbar" class="editor-toolbar" style="display:none;"><div class="editor-toolbar-inner"><button onclick="saveContent()">Save</button><button onclick="exitEditMode()">Exit</button></div></div>
  <button id="admin-trigger" class="admin-trigger" onclick="enterEditMode()">⚙️</button>
  <div id="login-modal" class="modal-overlay" style="display:none;"><div class="modal-box"><h2>Admin login</h2><input type="password" id="admin-password" onkeydown="if(event.key==='Enter') checkLogin()" /><button onclick="checkLogin()">Login</button></div></div>

  <div id="site-header"></div>

  <header class="page-hero-img" data-bg-key="contact-hero-bg">
    <div class="container">
      <h1 class="editable" data-key="contact-title">Contact</h1>
      <p class="editable" data-key="contact-intro">Peace Building, Kanifing, The Gambia — email <a href="mailto:info@gamainet.org">info@gamainet.org</a> or send us a message below.</p>
    </div>
  </header>

  <section class="section">
    <div class="container" style="max-width:560px;">
      <div style="background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:2rem;box-shadow:var(--shadow);">
        <form class="contact-form" onsubmit="submitContact(event)">
          <div class="form-group"><input type="text" id="contact-name" required placeholder="Name" /></div>
          <div class="form-group"><input type="email" id="contact-email-input" required placeholder="Email" /></div>
          <div class="form-group"><input type="text" id="contact-subject" placeholder="Subject" /></div>
          <div class="form-group"><textarea id="contact-message" rows="5" required placeholder="Message"></textarea></div>
          <button type="submit" class="btn-form">Send Message</button>
          <p id="contact-success" style="display:none;color:#10B981;margin-top:1rem;">Message sent!</p>
          <p id="contact-error" style="display:none;color:#EF4444;margin-top:1rem;"></p>
        </form>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="/chrome.js"></script>
  <script src="/editor.js"></script><script src="/main.js"></script>
</body>
</html>
